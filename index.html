<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pra você, meu lugar favorito</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="stars"></div>
  <div class="hearts" aria-hidden="true"></div>

  <main class="page">
    <section class="hero card fade-in">
      <p class="eyebrow">uma pequena carta para você</p>
      <h1>Pra você, meu lugar favorito</h1>
      <p class="subtitle">Daqui até a lua, ida e volta. 🌙</p>
      <button class="enter" onclick="document.getElementById('carta').scrollIntoView({behavior:'smooth'})">Abrir meu coração</button>
    </section>

    <section class="gallery card fade-in">
      <div class="photo-frame">
        <img id="slide" src="fotos/foto1.jpg" alt="Nossa foto" />
      </div>
      <div class="dots" id="dots"></div>
    </section>

    <section id="carta" class="letter card fade-in">
      <h2>Meu amor,</h2>
      <div id="typewriter" class="typewriter"></div>
    </section>

    <section class="music card fade-in">
      <p class="music-label">🎵 Nossa música</p>
      <h2>Metade de Mim</h2>
      <p>Rosa de Saron</p>
      <a class="spotify" href="https://open.spotify.com/intl-pt/track/1tPuHU5i192zGtNUk6fhXQ?si=ee7988541ced46b1" target="_blank" rel="noopener noreferrer">▶ Ouvir no Spotify</a>
    </section>

    <section class="closing card fade-in">
      <h2>Você é meu lugar. Sempre.</h2>
      <p>Qualquer lugar é meu lugar, desde que seja o seu lugar.</p>
      <span>❤️🌙</span>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
